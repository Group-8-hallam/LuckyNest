{% extends 'base.html' %}
{% block title %}Add Room - LuckyNest{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/rooms.css') }}">
{% endblock %}

{% block content %}
<div class="container">

    <div class="dashboard-header">
        <h2>Add New Room</h2>
    </div>

    <div class="auth-card" style="max-width:600px;">
        <form method="POST" action="{{ url_for('rooms.add_room') }}">

            <div class="form-group">
                <label>Room Number</label>
                <input type="text" name="number" placeholder="e.g. 101" required>
            </div>

            <div class="form-group">
                <label>Floor</label>
                <input type="number" name="floor" placeholder="e.g. 1">
            </div>

            <div class="form-group">
                <label>Room Type</label>
                <select name="type" style="width:100%; padding:0.5rem; border:1px solid #ccc; border-radius:4px;">
                    <option value="single">Single</option>
                    <option value="double">Double</option>
                    <option value="triple">Triple</option>
                </select>
            </div>

            <div class="form-group">
                <label>Weekly Rate (£)</label>
                <input type="number" step="0.01" name="price_weekly" placeholder="e.g. 150" required>
            </div>

            <div class="form-group">
                <label>Monthly Rate (£)</label>
                <input type="number" step="0.01" name="price_monthly" placeholder="e.g. 600" required>
            </div>

            <div class="form-group">
                <label>Security Deposit (£)</label>
                <input type="number" step="0.01" name="security_deposit" placeholder="e.g. 750">
            </div>

            <div class="form-group">
                <label>Amenities</label>
                <input type="text" name="amenities" placeholder="e.g. WiFi, AC, Parking">
            </div>

            <button type="submit" class="btn-primary">Add Room</button>
        </form>
    </div>

    <a href="{{ url_for('rooms.rooms') }}" class="btn-primary"
       style="display:inline-block; width:auto; margin-top:1rem;">
        ← Back to Rooms
    </a>

</div>
{% endblock %}
