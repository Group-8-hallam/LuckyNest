{% extends 'base.html' %}

{% block title %}Food Report{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/food_report.css') }}">
{% endblock %}

{% block content %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="rpt-header">
    <h1>Food Consumption Report</h1>
</div>

<hr class="rpt-divider">

<!-- KPIs -->
<div class="kpi-row">

    <div class="kpi-card">
        <span class="kpi-label">Revenue</span>
        <span class="kpi-value">£{{ revenue }}</span>
    </div>

    <div class="kpi-card">
        <span class="kpi-label">Cost</span>
        <span class="kpi-value">£{{ cost }}</span>
    </div>

    <div class="kpi-card">
        <span class="kpi-label">Profit</span>
        <span class="kpi-value">£{{ profit }}</span>
    </div>

</div>

<!-- CHARTS -->
<div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px;">

    <!-- BAR CHART -->
    <div class="rpt-card">
        <h3>Meals Served</h3>
        <canvas id="barChart"></canvas>
    </div>

    <!-- PIE CHART -->
    <div class="rpt-card">
        <h3>Meal Distribution</h3>
        <canvas id="pieChart"></canvas>
    </div>

</div>

<!-- CHART JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const labels = {{ meal_labels | tojson }};
const values = {{ meal_values | tojson }};

// BAR CHART
new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: {
        labels: labels,
        datasets: [{
            label: "Meals Served",
            data: values,
            backgroundColor: "#2c3e50"
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: { display: false }
        }
    }
});

// PIE CHART
new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
        labels: labels,
        datasets: [{
            data: values,
            backgroundColor: [
                "#2c3e50",
                "#2471a3",
                "#27ae60",
                "#e67e22"
            ]
        }]
    }
});
</script>

{% endblock %}
